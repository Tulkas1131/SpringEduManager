<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - SpringEduManager</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .login-container {
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            width: 100%;
            max-width: 400px;
        }
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
            font-size: 28px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 500;
        }
        input[type="text"],
        input[type="password"] {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
            transition: border-color 0.3s;
        }
        input[type="text"]:focus,
        input[type="password"]:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 5px rgba(102, 126, 234, 0.3);
        }
        button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }
        .info-box {
            background: #f0f4ff;
            padding: 15px;
            border-left: 4px solid #667eea;
            margin-top: 25px;
            border-radius: 5px;
            font-size: 13px;
            color: #555;
        }
        .credentials {
            margin-top: 12px;
            font-family: monospace;
        }
        .credential-item {
            margin: 5px 0;
            color: #333;
        }
        .error {
            color: #e74c3c;
            background: #fadbd8;
            padding: 10px;
            border-radius: 5px;
            margin-bottom: 20px;
            display: none;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <h1>🎓 SpringEduManager</h1>
        
        <div id="errorMessage" class="error"></div>
        
        <form id="loginForm">
            <div class="form-group">
                <label for="username">Usuario</label>
                <input type="text" id="username" name="username" placeholder="ej: user o admin" required>
            </div>
            
            <div class="form-group">
                <label for="password">Contraseña</label>
                <input type="password" id="password" name="password" placeholder="ej: user o admin" required>
            </div>
            
            <button type="submit">Iniciar Sesión</button>
        </form>
        
        <div class="info-box">
            <strong>Credenciales de prueba:</strong>
            <div class="credentials">
                <div class="credential-item">👤 Usuario: <strong>user</strong> | Contraseña: <strong>user</strong></div>
                <div class="credential-item">👨‍💼 Admin: <strong>admin</strong> | Contraseña: <strong>admin</strong></div>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const errorDiv = document.getElementById('errorMessage');
            
            console.log('🔐 Intentando login:', { username });
            
            try {
                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ username, password })
                });
                
                console.log('📡 Respuesta del servidor:', { status: response.status, ok: response.ok });
                
                const data = await response.json();
                console.log('📦 Datos recibidos:', { 
                    token: data.token ? 'presente' : 'ausente', 
                    username: data.username, 
                    role: data.role,
                    message: data.message
                });
                
                if (response.ok && data.token) {
                    console.log('✅ Token válido, guardando en localStorage');
                    
                    // Guardar token en localStorage
                    localStorage.clear(); // Limpiar primero
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('userEmail', data.username);
                    localStorage.setItem('userRole', data.role);
                    
                    console.log('✅ Tokens guardados en localStorage');
                    console.log('📊 localStorage actual:', {
                        token: localStorage.getItem('token') ? '✅ presente (longitud: ' + localStorage.getItem('token').length + ')' : '❌ ausente',
                        userEmail: localStorage.getItem('userEmail'),
                        userRole: localStorage.getItem('userRole')
                    });
                    
                    // Alert visual para confirmar
                    alert('✅ Login exitoso. Token guardado. Redirigiendo...');
                    
                    // Redirigir al dashboard con delay
                    setTimeout(() => {
                        console.log('🚀 Redirigiendo a /dashboard');
                        window.location.href = '/dashboard';
                    }, 1000);
                } else {
                    console.error('❌ Error en respuesta:', data);
                    const errorMsg = data.message || 'Credenciales inválidas';
                    errorDiv.textContent = errorMsg;
                    errorDiv.style.display = 'block';
                    alert('❌ Error: ' + errorMsg);
                }
            } catch (error) {
                console.error('💥 Error en fetch:', error);
                errorDiv.textContent = 'Error al conectar: ' + error.message;
                errorDiv.style.display = 'block';
                alert('💥 Error: ' + error.message);
            }
        });
    </script>
</body>
</html>
