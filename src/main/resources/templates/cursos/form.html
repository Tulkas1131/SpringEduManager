<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Curso - Formulario</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        body {
            background-color: #f5f5f5;
        }
        .navbar {
            background-color: #2c3e50;
        }
        .navbar-brand {
            font-weight: bold;
            color: #fff !important;
        }
        .nav-link {
            color: #ecf0f1 !important;
        }
        .nav-link:hover {
            color: #fff !important;
        }
        .btn-logout {
            background-color: #e74c3c;
            color: white;
            border: none;
            font-size: 0.875rem;
        }
        .btn-logout:hover {
            background-color: #c0392b;
            color: white;
        }
    </style>
</head>
<body>
    <!-- Barra de navegación -->
    <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="/">Spring EduManager</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                    <li class="nav-item">
                        <a class="nav-link" href="/estudiantes">Estudiantes</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/cursos">Cursos</a>
                    </li>
                </ul>
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <span class="nav-link" id="userEmail">Cargando...</span>
                    </li>
                    <li class="nav-item">
                        <button class="btn btn-logout btn-sm" onclick="logout()">Cerrar sesión</button>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Contenido principal -->
    <div class="container mt-4">
        <div class="row">
            <div class="col-md-6">
                <h2>📖 <span th:if="${curso.id == null}">Nuevo</span><span th:if="${curso.id != null}">Editar</span> Curso</h2>
                <form th:action="${curso.id != null} ? @{|/cursos/${curso.id}|} : @{/cursos}" th:object="${curso}" method="post">
                    <input type="hidden" th:field="*{id}">
                    <div class="mb-3">
                        <label class="form-label">Nombre del Curso</label>
                        <input type="text" class="form-control" th:field="*{nombre}" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Descripción</label>
                        <textarea class="form-control" th:field="*{descripcion}" required></textarea>
                    </div>
                    <button type="submit" class="btn btn-success">Guardar</button>
                    <a href="/cursos" class="btn btn-secondary">Cancelar</a>
                </form>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Verificar autenticación al cargar
        function checkAuth() {
            console.log('🔍 Verificando autenticación en /cursos/form');
            
            const token = localStorage.getItem('token');
            const userEmail = localStorage.getItem('userEmail');
            
            console.log('📊 localStorage:', {
                token: token ? '✅ presente' : '❌ ausente',
                userEmail: userEmail ? `✅ ${userEmail}` : '❌ ausente'
            });

            if (!token) {
                console.warn('⚠️ Sin token, redirigiendo a login');
                // Sin token, redirigir al login con delay
                setTimeout(() => {
                    window.location.href = '/login';
                }, 500);
                return;
            }

            console.log('✅ Token presente, mostrando contenido');
            // Mostrar email del usuario
            document.getElementById('userEmail').textContent = `Hola, ${userEmail || 'Usuario'}`;
        }

        // Cerrar sesión
        function logout() {
            console.log('🚪 Cerrando sesión');
            localStorage.removeItem('token');
            localStorage.removeItem('userEmail');
            localStorage.removeItem('userRole');
            console.log('✅ localStorage limpiado');
            window.location.href = '/login';
        }

        // Verificar autenticación al entrar
        console.log('📄 Página cursos/form.html cargada');
        window.addEventListener('load', checkAuth);
    </script>
</body>
</html>
