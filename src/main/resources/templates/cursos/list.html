<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista de Cursos</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        body {
            background-color: #f5f5f5;
        }
        .navbar {
            background-color: #2c3e50;
        }
        .navbar-brand {
            font-weight: bold;
            color: #fff !important;
        }
        .nav-link {
            color: #ecf0f1 !important;
        }
        .nav-link:hover {
            color: #fff !important;
        }
        .btn-logout {
            background-color: #e74c3c;
            color: white;
            border: none;
            font-size: 0.875rem;
        }
        .btn-logout:hover {
            background-color: #c0392b;
            color: white;
        }
    </style>
</head>
<body>
    <!-- Barra de navegación -->
    <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="/">Spring EduManager</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                    <li class="nav-item">
                        <a class="nav-link" href="/estudiantes">Estudiantes</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" href="/cursos">Cursos</a>
                    </li>
                </ul>
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <span class="nav-link" id="userEmail">Cargando...</span>
                    </li>
                    <li class="nav-item">
                        <button class="btn btn-logout btn-sm" onclick="logout()">Cerrar sesión</button>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Contenido principal -->
    <div class="container mt-4">
        <h2>📖 Listado de Cursos</h2>
        <a id="newCourseBtn" href="/cursos/nuevo" class="btn btn-primary mb-3" style="display: none;">+ Nuevo Curso</a>
        
        <div class="table-responsive">
            <table class="table table-striped table-hover">
                <thead class="table-dark">
                    <tr>
                        <th>ID</th>
                        <th>Nombre</th>
                        <th>Descripción</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="curso : ${cursos}">
                        <td th:text="${curso.id}">1</td>
                        <td th:text="${curso.nombre}">Nombre</td>
                        <td th:text="${curso.descripcion}">Descripción</td>
                        <td>
                            <a th:href="@{/cursos/{id}(id=${curso.id})}" class="btn btn-sm btn-info">Editar</a>
                            <a th:href="@{/cursos/eliminar/{id}(id=${curso.id})}" class="btn btn-sm btn-danger" onclick="return confirm('¿Eliminar?')">Eliminar</a>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Verificar autenticación al cargar
        function checkAuth() {
            console.log('🔍 Verificando autenticación en /cursos');
            
            const token = localStorage.getItem('token');
            const userEmail = localStorage.getItem('userEmail');
            const userRole = localStorage.getItem('userRole');
            
            console.log('📊 localStorage:', {
                token: token ? '✅ presente (longitud: ' + token.length + ')' : '❌ ausente',
                userEmail: userEmail ? `✅ ${userEmail}` : '❌ ausente',
                userRole: userRole ? `✅ ${userRole}` : '❌ ausente'
            });

            if (!token) {
                console.warn('⚠️ Sin token, redirigiendo a login');
                alert('⚠️ Sin autenticación. Redirigiendo a login...');
                // Sin token, redirigir al login con delay
                setTimeout(() => {
                    window.location.href = '/login';
                }, 500);
                return;
            }

            console.log('✅ Token presente, mostrando contenido');
            alert('✅ Autenticado. Mostrando cursos...');
            // Mostrar email del usuario
            document.getElementById('userEmail').textContent = `Hola, ${userEmail || 'Usuario'}`;

            // Si es ADMIN, mostrar botón de nuevo curso
            if (userRole === 'ADMIN') {
                console.log('👨‍💼 Usuario es ADMIN, mostrando botón');
                document.getElementById('newCourseBtn').style.display = '';
            } else {
                console.log('👤 Usuario es regular');
            }
        }

        // Cerrar sesión
        function logout() {
            console.log('🚪 Cerrando sesión');
            localStorage.removeItem('token');
            localStorage.removeItem('userEmail');
            localStorage.removeItem('userRole');
            console.log('✅ localStorage limpiado');
            alert('✅ Sesión cerrada');
            window.location.href = '/login';
        }

        // Verificar autenticación al entrar
        console.log('📄 Página cursos/list.html cargada');
        window.addEventListener('load', checkAuth);
    </script>
</body>
</html>
