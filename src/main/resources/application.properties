# Configuración de la aplicación Spring Boot
spring.application.name=SpringEduManager

# Configuración de la base de datos H2 (en memoria)
spring.datasource.url=jdbc:h2:mem:edudb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Configuración JPA/Hibernate
# ddl-auto=update: crea/actualiza tablas automáticamente
spring.jpa.hibernate.ddl-auto=update
# defer-datasource-initialization: ejecuta data.sql DESPUÉS de crear tablas
spring.jpa.defer-datasource-initialization=true
# show-sql=false: no muestra las sentencias SQL en consola (mejor rendimiento)
spring.jpa.show-sql=false

# Configuración de logs: nivel WARN para Spring Security
logging.level.org.springframework.security=WARN

# Configuración JWT
# jwt.secret: clave secreta para firmar los tokens (CAMBIAR EN PRODUCCIÓN)
jwt.secret=SpringEduManagerSecretKey2026
# jwt.expiration: tiempo de expiración en milisegundos (86400000 = 24 horas)
jwt.expiration=86400000
